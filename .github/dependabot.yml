version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "Asia/Tokyo"
      day: "friday"
    cooldown:
      default-days: 1

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "Asia/Tokyo"
      day: "friday"
    cooldown:
      default-days: 1
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
